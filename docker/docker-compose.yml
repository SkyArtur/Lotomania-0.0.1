name: lotomania-0.0.0.1

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    env_file:
      - ../lotomania-API/.env
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../lotomania-API
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../lotomania-API/.env
    environment:
      DJANGO_ENV: production
      DEBUG: "False"
    ports:
      - "8080:8080"
    volumes:
      - ../lotomania-API/core/data:/app/core/data:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../lotomania-API
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../lotomania-API/.env
    environment:
      DJANGO_ENV: production
      DEBUG: "False"
    command: ["celery", "-A", "config", "worker", "-l", "info"]
    volumes:
      - ../lotomania-API/core/data:/app/core/data:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ../lotomania-API
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../lotomania-API/.env
    environment:
      DJANGO_ENV: production
      DEBUG: "False"
    command: ["celery", "-A", "config", "beat", "-l", "info"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  app:
    build:
      context: ../lotomania-APP
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  db_data:
